# ============================================================
# 使用者設定
# 一個 YAML 檔案代表一個使用者
# ============================================================
user:
  # 使用者識別名稱，只用於報告與通知顯示
  # 可以使用中文，但同一份專案內不要重複
  id: example

  # 是否啟用這份使用者配置
  # true：執行監控
  # false：跳過整份配置
  enabled: false

  # Discord Webhook 對應名稱
  # default 會讀取環境變數 DISCORD_WEBHOOK_URL
  # 未來多人使用時，可設定不同的 key
  discord_webhook_key: default


# ============================================================
# 共用應用程式設定
# ============================================================
app:
  # 時區，台灣使用 Asia/Taipei
  timezone: Asia/Taipei

  # 報告與 Discord 訊息語言
  language: zh-TW

  # 預設大盤比較指數
  # 上市股票通常使用 TAIEX
  # 上櫃股票會由程式自動改用 TPEx
  market_symbol: TAIEX

  # GitHub Pages 完整報告網址
  # 尚未設定 GitHub Pages 時可以先留空
  # 範例：https://帳號.github.io/repository-name
  report_base_url: ""


# ============================================================
# 股票追蹤清單
# 每支股票至少需要填寫 symbol
# name、market 會由程式自動辨識
# ============================================================
stocks:
  # ----------------------------------------------------------
  # 台積電
  # ----------------------------------------------------------
  - symbol: "2330"

    # 是否監控這支股票
    # false 時會跳過這支股票
    enabled: true

    # 持倉設定
    holding:
      # true：目前已持有，會計算價格報酬與持倉操作傾向
      # false：未持有，只分析買入／避開傾向
      enabled: true

      # 平均持有成本
      # 不需要填持有股數
      average_cost: 620

    # 停利提醒設定
    profit_take:
      # 價格報酬達到 50% 時，發出停利提醒
      alert_at_pct: 50

      # 價格報酬達到 75% 時，發出較強的停利提醒
      strong_alert_at_pct: 75

    # 下跌後的條件式加碼評估
    add_on:
      # 是否啟用加碼評估
      enabled: true

      # 價格報酬跌至 -10%、-20%、-30% 時重新評估
      # 達到跌幅不代表一定建議加碼
      alert_at_loss_pct: [10, 20, 30]

      # 個股客觀分析至少達到 40 分，才允許產生加碼調整
      minimum_analysis_score: 40

      # 因跌幅產生的加碼分數最多只能增加 10 分
      # 避免股票跌越多，系統反而越推薦加碼
      maximum_adjustment: 10

    # 同業股票代碼
    # 用來比較相對表現、產業廣度與營收趨勢
    # 建議填真正業務相近的公司，不只是同一大產業
    peers:
      - "2303" # 聯電
      - "2454" # 聯發科


  # ----------------------------------------------------------
  # 聯電
  # ----------------------------------------------------------
  - symbol: "2303"
    enabled: true

    holding:
      # 目前未持有，因此不需要 average_cost
      enabled: false

    # 未啟用持倉時，可以省略 profit_take 與 add_on
    peers:
      - "2330" # 台積電
      - "5347" # 世界