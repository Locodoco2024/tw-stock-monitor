# ============================================================
# 使用者設定
# ============================================================
user:
  id: ou
  enabled: true
  discord_webhook_key: default

# ============================================================
# 共用應用程式設定
# ============================================================
app:
  timezone: Asia/Taipei
  language: zh-TW
  market_symbol: TAIEX
  report_base_url: ""

# ============================================================
# 持股設定
#
# 圖片中的「平均單價」已填入 average_cost。
# 未填持股數量，僅用於價格報酬與持倉傾向計算。
# peers 暫時留空，不進行手動同業比較。
# ============================================================
stocks:
  - symbol: "1815" # 富喬
    enabled: true
    holding:
      enabled: true
      average_cost: 97.85
    profit_take:
      alert_at_pct: 50
      strong_alert_at_pct: 75
    add_on:
      enabled: true
      alert_at_loss_pct: [10, 20, 30]
      minimum_analysis_score: 40
      maximum_adjustment: 10
    peers: []

